name: Deploy to GitHub Pages

# Builds the Vite SPA on GitHub's runners (which use the public npm registry,
# avoiding the local corporate-registry restriction) and deploys dist/ to
# GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  # Allows manually triggering the workflow from the Actions tab.
  workflow_dispatch:

# Grants the GITHUB_TOKEN the permissions required to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do NOT cancel in-progress runs, so a deploy
# can complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # `npm install` (not `npm ci`) because this repo has no committed
      # package-lock.json yet — the local corporate registry blocks installs,
      # so the lockfile is generated here on the runner against public npm.
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages with the "GitHub Actions" source if it isn't
          # already, flipping the repo off the old branch-based Pages on the
          # first run.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
